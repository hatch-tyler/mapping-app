#cloud-config

package_update: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - jq
  - unzip

# Install Docker and Docker Compose
runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo -e "Types: deb\nURIs: https://download.docker.com/linux/ubuntu\nSuites: $$(. /etc/os-release && echo $$VERSION_CODENAME)\nComponents: stable\nSigned-By: /etc/apt/keyrings/docker.asc" > /etc/apt/sources.list.d/docker.sources
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ${admin_username}

  # Detect, format, and mount the managed data disk at /mnt/data.
  #
  # Critical: this must FAIL LOUDLY if the disk can't be set up rather than
  # silently falling back to creating /mnt/data as a regular directory. The
  # default Azure cloud config mounts the *ephemeral resource disk* at /mnt
  # (and resource disks are zeroed on every VM stop/deallocate, including
  # resizes), so a silent fallback would land Postgres data, uploads, and
  # certs on storage that gets wiped at any restart. See incident
  # 2026-04-30: a year of "working" /mnt/data was actually on the resource
  # disk and a single VM resize wiped the entire DB. The previous version
  # of this block had that silent fallback; the version below refuses.
  - |
    set -e
    echo "[disk-setup] Waiting for managed data disk at LUN 0..."

    DATA_DISK=""
    for i in $$(seq 1 60); do
      # Canonical: Azure udev symlink. Stable across host re-attach.
      if [ -b /dev/disk/azure/scsi1/lun0 ]; then
        DATA_DISK=$$(readlink -f /dev/disk/azure/scsi1/lun0)
        break
      fi
      # Fallback: SCSI letter scan (skip sda=OS, sdb=ephemeral resource).
      for candidate in /dev/sdc /dev/sdd; do
        if [ -b "$$candidate" ]; then
          DATA_DISK="$$candidate"
          break 2
        fi
      done
      sleep 5
    done

    if [ -z "$$DATA_DISK" ]; then
      echo "[disk-setup] FATAL: managed data disk not found after 5 min."
      echo "[disk-setup] Block devices present:"
      lsblk
      touch /var/log/cloud-init-data-disk-FAILED
      exit 1
    fi
    echo "[disk-setup] Using $$DATA_DISK"

    # Format only if no filesystem exists; idempotent on re-runs.
    if ! blkid "$$DATA_DISK" | grep -q "TYPE="; then
      echo "[disk-setup] Formatting $$DATA_DISK as ext4..."
      mkfs.ext4 -F -L mapping-app-data "$$DATA_DISK"
    fi

    DISK_UUID=$$(blkid -s UUID -o value "$$DATA_DISK")
    echo "[disk-setup] Data disk UUID: $$DISK_UUID"

    mkdir -p /mnt/data
    if ! grep -q "$$DISK_UUID" /etc/fstab; then
      echo "UUID=$$DISK_UUID /mnt/data ext4 defaults,nofail,x-systemd.requires=cloud-init.service 0 2" >> /etc/fstab
    fi
    mount -a

    # Sanity-check: /mnt/data must be a mount point on the expected device.
    if ! mountpoint -q /mnt/data; then
      echo "[disk-setup] FATAL: /mnt/data is not a mount point after mount -a."
      cat /etc/fstab
      touch /var/log/cloud-init-data-disk-FAILED
      exit 1
    fi
    MOUNTED_DEV=$$(findmnt -n -o SOURCE /mnt/data)
    if [ "$$MOUNTED_DEV" != "$$DATA_DISK" ]; then
      echo "[disk-setup] FATAL: /mnt/data mounted from $$MOUNTED_DEV, expected $$DATA_DISK."
      touch /var/log/cloud-init-data-disk-FAILED
      exit 1
    fi

    echo "[disk-setup] /mnt/data successfully mounted on $$DATA_DISK"
    touch /var/log/cloud-init-data-disk-OK

  # Create directory structure on data disk
  - mkdir -p /mnt/data/postgres
  - mkdir -p /mnt/data/uploads
  - mkdir -p /mnt/data/rasters
  - mkdir -p /mnt/data/certbot/conf
  - mkdir -p /mnt/data/certbot/www
  - mkdir -p /mnt/data/backups

  # Create a 4 GB swapfile as a safety net for memory spikes during bulk
  # upload processing. Backend mem_limit is sized to fit in RAM; swap
  # exists so a brief overshoot degrades to slowness instead of OOM-kill.
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 4G /swapfile
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi

  # Daily nginx reload at 03:00 UTC so newly-renewed Let's Encrypt certs
  # take effect within 24 h. The certbot container runs `certbot renew`
  # every 12 h but doesn't signal nginx; this cron picks up any cert
  # change. Reload is a no-op if the cert hasn't changed.
  #
  # Daily backup at 02:00 UTC: invokes the backend's backup CLI, which
  # writes db/uploads/rasters tarballs to /mnt/data/backups and prunes
  # files older than BACKUP_RETENTION_DAYS.
  - |
    CRON_LINES=$(printf '%s\n' \
      '0 3 * * * /usr/bin/docker exec gis-nginx nginx -s reload >> /var/log/nginx-reload.log 2>&1' \
      '0 2 * * * /usr/bin/docker exec gis-backend python -m app.commands.create_backup >> /var/log/mapping-app-backup.log 2>&1')
    (crontab -u azureuser -l 2>/dev/null; echo "$CRON_LINES") | sort -u | crontab -u azureuser -

  # Create application directory
  - mkdir -p /opt/mapping-app

  # Write .env file
  - |
    cat > /opt/mapping-app/.env << 'ENVEOF'
    # Database
    DB_USER=${db_username}
    DB_PASSWORD=${db_password}
    DB_NAME=${db_name}

    # Backend
    SECRET_KEY=${secret_key}
    DOMAIN_NAME=${domain_name}
    URL_SCHEME=${url_scheme}

    # Application
    UPLOAD_MAX_SIZE_MB=${upload_max_size_mb}
    INITIAL_ADMIN_EMAIL=${initial_admin_email}
    INITIAL_ADMIN_PASSWORD=${initial_admin_password}
    INITIAL_ADMIN_FULL_NAME=${initial_admin_full_name}

    # Email (configure after deployment if needed)
    SMTP_HOST=
    SMTP_PORT=587
    SMTP_USER=
    SMTP_PASSWORD=
    SMTP_FROM_EMAIL=noreply@${domain_name}
    SMTP_FROM_NAME=GIS Application

    # Off-VM backup replication (Azure Blob). Both values are blank when
    # enable_backup_blob_storage = false in Terraform — replication is
    # then skipped silently and only local copies are written.
    AZURE_BACKUP_CONTAINER=${azure_backup_container}
    AZURE_STORAGE_ACCOUNT_URL=${azure_storage_account_url}
    ENVEOF

  # Fix .env indentation (remove leading whitespace from heredoc)
  - sed -i 's/^    //' /opt/mapping-app/.env
  - chmod 600 /opt/mapping-app/.env
  - chown ${admin_username}:${admin_username} /opt/mapping-app/.env

  # Write nginx config from template (initial HTTP-only)
  - mkdir -p /opt/mapping-app/nginx
  - |
    cat > /opt/mapping-app/nginx/nginx-active.conf << 'NGINXEOF'
    server {
        listen 80;
        server_name ${domain_name} _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        client_max_body_size ${upload_max_size_mb}m;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

        root /usr/share/nginx/html;
        index index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $$uri =404;
        }

        location / {
            try_files $$uri $$uri/ /index.html;
        }

        location /api {
            proxy_pass http://backend:8000;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /rest {
            proxy_pass http://backend:8000;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $$host;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    NGINXEOF

  # Fix nginx config indentation
  - sed -i 's/^    //' /opt/mapping-app/nginx/nginx-active.conf

  # Copy init-db.sql
  - mkdir -p /opt/mapping-app/scripts
  - |
    cat > /opt/mapping-app/scripts/init-db.sql << 'SQLEOF'
    CREATE EXTENSION IF NOT EXISTS postgis;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    SELECT PostGIS_Version();
    SQLEOF

  # Set ownership
  - chown -R ${admin_username}:${admin_username} /opt/mapping-app
  - chown -R ${admin_username}:${admin_username} /mnt/data

  # Write setup instructions
  - |
    cat > /opt/mapping-app/SETUP.md << 'SETUPEOF'
    # Mapping App - Azure VM Setup

    ## Next Steps

    1. Clone the repository:
       cd /opt/mapping-app && git clone <your-repo-url> repo

    2. Copy compose file and scripts from repo:
       cp /opt/mapping-app/repo/azure/docker-compose.prod.yml /opt/mapping-app/docker-compose.prod.yml
       cp /opt/mapping-app/repo/azure/scripts/*.sh /opt/mapping-app/scripts/
       chmod +x /opt/mapping-app/scripts/*.sh

    3. Build the frontend:
       cd /opt/mapping-app
       docker compose -f docker-compose.prod.yml --profile build run --rm frontend-builder

    4. Start all services:
       docker compose -f docker-compose.prod.yml up -d

    5. Check health:
       curl http://localhost/api/health

    6. After DNS propagates, set up SSL:
       cd /opt/mapping-app && bash scripts/ssl-setup.sh

    7. Get admin password from Terraform:
       terraform output -raw initial_admin_password
    SETUPEOF

  - sed -i 's/^    //' /opt/mapping-app/SETUP.md
  - sed -i 's/^    //' /opt/mapping-app/scripts/init-db.sql
  - chown ${admin_username}:${admin_username} /opt/mapping-app/SETUP.md

  # Add certbot email to .env for ssl-setup.sh
  - echo "CERTBOT_EMAIL=${certbot_email}" >> /opt/mapping-app/.env

  - echo "Cloud-init provisioning complete. See /opt/mapping-app/SETUP.md for next steps."
